<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Debug</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        .log {
            margin: 10px 0;
            padding: 10px;
            background: #2a2a2a;
            border-left: 3px solid #00ff00;
        }
        .error {
            border-left-color: #ff0000;
            color: #ff6666;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            background: #00ff00;
            color: #1a1a1a;
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        button:hover {
            background: #00cc00;
        }
    </style>
</head>
<body>
    <h1>OAuth Debug Tool</h1>
    <div id="logs"></div>
    
    <button onclick="checkLocalStorage()">Check localStorage</button>
    <button onclick="checkURL()">Check URL Params</button>
    <button onclick="clearStorage()">Clear Storage</button>
    <button onclick="testBackend()">Test Backend</button>

    <script>
        function log(message, isError = false) {
            const div = document.createElement('div');
            div.className = 'log' + (isError ? ' error' : '');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            document.getElementById('logs').appendChild(div);
            console.log(message);
        }

        function checkLocalStorage() {
            log('=== localStorage Contents ===');
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                log(`${key}: ${value.substring(0, 100)}${value.length > 100 ? '...' : ''}`);
            }
            
            const verifier = localStorage.getItem('kareerist-auth-code-verifier');
            if (verifier) {
                log(`✓ Code verifier found (length: ${verifier.length})`);
            } else {
                log('✗ Code verifier NOT found', true);
            }
        }

        function checkURL() {
            log('=== URL Parameters ===');
            const params = new URLSearchParams(window.location.search);
            
            if (params.toString()) {
                params.forEach((value, key) => {
                    log(`${key}: ${value.substring(0, 50)}${value.length > 50 ? '...' : ''}`);
                });
            } else {
                log('No URL parameters found');
            }
            
            const code = params.get('code');
            const error = params.get('error') || params.get('error_description');
            
            if (code) {
                log(`✓ OAuth code found (length: ${code.length})`);
            } else if (error) {
                log(`✗ OAuth error: ${error}`, true);
            } else {
                log('No OAuth code or error in URL');
            }
        }

        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            log('✓ All storage cleared');
        }

        async function testBackend() {
            log('=== Testing Backend Connection ===');
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/me', {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log(`✓ Backend is running and responding`);
                    log(`Response: ${JSON.stringify(data)}`);
                } else {
                    log(`Backend responded with status: ${response.status}`, true);
                }
            } catch (error) {
                log(`✗ Cannot connect to backend: ${error.message}`, true);
                log('Make sure backend is running on http://localhost:8000', true);
            }
        }

        // Auto-check on load
        window.addEventListener('load', () => {
            log('OAuth Debug Tool Loaded');
            checkURL();
            checkLocalStorage();
        });
    </script>
</body>
</html>
